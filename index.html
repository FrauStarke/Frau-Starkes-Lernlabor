<!DOCTYPE html>
<html>
<head>
<title>Frau Starkes Lernlabor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
background:white;
color:#222;
text-align:center;
padding:40px;
}

button{
padding:15px 25px;
margin:10px;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
background:#f5f5f5;
cursor:pointer;
}

#mathebereich{
display:none;
margin-top:40px;
}

input{
padding:10px;
font-size:18px;
width:120px;
}

</style>

<script>

let a;
let b;

function matheStart(){

document.getElementById("mathebereich").style.display="block";
neueAufgabe();

}

function neueAufgabe(){

a = Math.floor(Math.random()*10)+1;
b = Math.floor(Math.random()*10)+1;

document.getElementById("aufgabe").innerHTML = a + " × " + b;

document.getElementById("antwort").value="";
document.getElementById("result").innerHTML="";

}

function pruefen(){

let richtig = a*b;
let antwort = document.getElementById("antwort").value;

if(antwort == richtig){
document.getElementById("result").innerHTML="✅ Richtig!";
}
else{
document.getElementById("result").innerHTML="❌ Noch einmal versuchen";
}

}

</script>

</head>

<body>

<h1>🔬 Frau Starkes Lernlabor</h1>

<p>Interaktive Übungen für Mathematik und Physik</p>

<button onclick="matheStart()">Mathe</button>

<div id="mathebereich">

<h2>Kopfrechnen – Einmaleins</h2>

<p id="aufgabe"></p>

<input id="antwort" type="number">

<br><br>

<button onclick="pruefen()">Antwort prüfen</button>

<button onclick="neueAufgabe()">Neue Aufgabe</button>

<p id="result"></p>

</div>

</body>
</html>
